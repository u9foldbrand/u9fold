<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>u9fold | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            color: black;
            font-family: 'Space Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        .enter-btn {
            font-size: 0.8rem;
            letter-spacing: 6px;
            animation: pulse 2s infinite;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        #main-content {
            opacity: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: opacity 1.5s ease-in-out;
        }

        .logo {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.5rem;
            margin: 0;
            text-transform: lowercase;
            letter-spacing: -2px;
        }

        #clock {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #555;
        }

        .coming-soon {
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 5px;
            color: #888;
        }

        .insta-link {
            margin-top: 40px;
            color: black;
            transition: transform 0.3s ease;
        }

        .insta-link:hover {
            transform: scale(1.1);
        }

        /* Hidden Audio Container */
        #player-container {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <div class="enter-btn">Press to Enter</div>
    </div>

    <div id="main-content">
        <h1 class="logo">u9fold</h1>
        <div id="clock">03/19/2026 10:16:00</div>
        <div class="coming-soon">Coming Soon</div>
        
        <a href="https://www.instagram.com/u9fold?igsh=MmE3aHFuZ3N5dWU2" target="_blank" class="insta-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        </a>
    </div>

    <div id="player-container">
        <iframe id="video-player" src="https://www.youtube.com/embed/Ecm8TmNfP2Q?enablejsapi=1&autoplay=0" frameborder="0"></iframe>
    </div>

    <script>
        // Digital Clock Logic
        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const year = now.getFullYear();
            const time = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('clock').innerText = `${month}/${day}/${year} ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Reveal Site and Play Music
        function startExperience() {
            // Hide Overlay
            document.getElementById('overlay').style.display = 'none';
            
            // Show Content
            const content = document.getElementById('main-content');
            content.style.opacity = '1';
            
            // Play Music via YouTube API trick
            const player = document.getElementById('video-player');
            player.src += "&autoplay=1";
        }
    </script>
</body>
</html>
